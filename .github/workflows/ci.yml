name: CI

on:
  push:
    branches:
      - main
      - master
      - phase0-task1-contracts
  pull_request:

jobs:
  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release assets
        run: bash scripts/check.sh docs

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web app
        run: bash scripts/check.sh web
      - name: Run web tests
        run: bash scripts/test.sh web

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/server/go.mod
      - name: Run server checks
        run: bash scripts/check.sh server
      - name: Run server tests
        run: bash scripts/test.sh server
